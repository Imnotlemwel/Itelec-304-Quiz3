<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
</head>
<body>
    <h1>Online Product Display</h1>
    <ul>
        {% for product in products %}
            <li>{{ product.name }} - ₱{{ product.price|floatformat:0 }}</li>
        {% empty %}
            <li>Walang produktong makita.</li>
        {% endfor %}
    </ul>
</body>
</html>
